<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Receta - Recetas De Comidas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../Css/menu.css">
    <link rel="stylesheet" href="../Css/crear_receta.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="https://cdn-icons-png.flaticon.com/512/1830/1830878.png" 
                     alt="Logo Recetas De Comidas" 
                     class="logo-img me-2" style="width: 40px;">
                <span class="brand-text">Recetas De Comidas</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
  <li class="nav-item"><a href="index.html" class="nav-link">Inicio</a></li>
                        <li class="nav-item"><a href="AcercaDe.html" class="nav-link">Acerca De</a></li>
                        <li class="nav-item"><a href="Menu.html" class="nav-link">Menú</a></li>
                        <li class="nav-item"><a href="contacto.html" class="nav-link">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Reemplazar el contenido del formulario actual -->
<div class="recipe-form-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card recipe-card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0">
                            <i class="fas fa-utensils me-2"></i>Nueva Receta
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="creator-info mb-4">
                            <span>Creando receta como: <strong>Jonier2</strong></span>
                        </div>
                        <form id="nuevaRecetaForm" class="recipe-form needs-validation" novalidate>
                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-pencil-alt me-2"></i>Nombre de la Receta
                                </label>
                                <input type="text" class="form-control" id="nombreReceta" required>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-tags me-2"></i>Categoría
                                </label>
                                <select class="form-select" id="categoriaReceta" required>
                                    <option value="">Selecciona...</option>
                                    <option value="desayunos">Desayunos</option>
                                    <option value="comidas">Comidas</option>
                                    <option value="postres">Postres</option>
                                    <option value="bebidas">Bebidas</option>
                                </select>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-clock me-2"></i>Tiempo de Preparación (minutos)
                                </label>
                                <input type="number" class="form-control" id="tiempoPreparacion" min="1" required>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-list-ul me-2"></i>Ingredientes
                                </label>
                                <textarea class="form-control" id="ingredientes" rows="4" required 
                                    placeholder="Escribe cada ingrediente en una línea nueva"></textarea>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-list-ol me-2"></i>Pasos de Preparación
                                </label>
                                <textarea class="form-control" id="pasos" rows="4" required
                                    placeholder="Escribe cada paso en una línea nueva"></textarea>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-image me-2"></i>URL de la Imagen
                                </label>
                                <input type="url" class="form-control" id="imagenUrl" 
                                    placeholder="https://ejemplo.com/imagen.jpg">
                                <small class="text-muted">Si no proporcionas una imagen, se usará una por defecto.</small>
                            </div>

                            <div class="form-group mb-3">
                                <label class="fw-bold">
                                    <i class="fas fa-info-circle me-2"></i>Información Nutricional (opcional)
                                </label>
                                <textarea class="form-control" id="infoNutricional" rows="3"
                                    placeholder="Escribe la información nutricional"></textarea>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Guardar Receta
                                </button>
                                <a href="index.html" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../Js/script.js"></script>
    <script src="../Js/crear_receta.js"></script>
</body>
</html>
