<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Recetas de Comidas</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../Css/iniciar_sesion.css">
    <!-- Asegúrate de tener estos enlaces a SweetAlert2 en el head -->
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-material-ui/material-ui.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="left-side">
                <div class="content-wrapper">
                    <img src="https://cdn-icons-png.flaticon.com/512/1830/1830878.png" alt="Chef Logo" class="chef-logo">
                    <h1>Bienvenido a Recetas De Comidas</h1>
                    <p>¡Nos alegra verte de nuevo!</p>
                </div>
            </div>
            <div class="right-side">
                <div class="form-wrapper">
                    <h2>Iniciar Sesión</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn-login">Ingresar</button>
                        </div>
                        <div class="login-links">
                            <a href="recuperar_contrasena.html">¿Olvidaste tu contraseña?</a>
                            <p>¿No tienes cuenta? <a href="crear_cuenta.html">Regístrate</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Pregunta de Seguridad -->
<div class="modal fade" id="securityQuestionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Verificación de Seguridad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="securityQuestionForm">
                    <div class="mb-3">
                        <label for="recoveryEmail" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="recoveryEmail" required>
                    </div>
                    <div class="mb-3">
                        <label id="questionLabel" class="form-label">Pregunta de Seguridad</label>
                        <select class="form-control" id="securityQuestionSelect" required>
                            <option value="">Seleccione una pregunta</option>
                            <option value="¿Cuál es el nombre de tu primera mascota?">¿Cuál es el nombre de tu primera mascota?</option>
                            <option value="¿Cuál es tu nombre completo?">¿Cuál es tu nombre completo?</option>
                            <option value="¿En qué ciudad naciste?">¿En qué ciudad naciste?</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="securityAnswer" class="form-label">Respuesta</label>
                        <input type="text" class="form-control" id="securityAnswer" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="verifyAnswerBtn">Verificar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Cambiar Contraseña -->
<div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cambiar Contraseña</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="changePasswordForm">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">Nueva Contraseña</label>
                        <input type="password" class="form-control" id="newPassword" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirmNewPassword" class="form-label">Confirmar Nueva Contraseña</label>
                        <input type="password" class="form-control" id="confirmNewPassword" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="changePasswordBtn">Cambiar Contraseña</button>
            </div>
        </div>
    </div>
</div>

    <!-- Coloca los scripts en este orden al final del body -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../Js/iniciar_sesion.js"></script>
 
</body>
</html>
